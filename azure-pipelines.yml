trigger: none

pool: AIPROJECTPOOL

stages:
  - stage: 
    displayName: Terrafrom Init task
    jobs:
      - job:
        steps:
        - task: TerraformTask@5
          inputs:
            provider: 'azurerm'
            command: 'init'
            workingDirectory: '$(System.DefaultWorkingDirectory)/environment/dev'
            backendServiceArm: 'AIPROJECTSERVICE'
            backendAzureRmResourceGroupName: 'AI_RG'
            backendAzureRmStorageAccountName: 'aistgproject'
            backendAzureRmContainerName: 'aicontainer'
            backendAzureRmKey: 'terrafrom.tfstate'

  - stage: 
    displayName: Security stage 
    jobs:
      - job: 
        steps:
        - task: tfsec@1
          inputs:
            version: 'v1.26.0'
            dir: '$(System.DefaultWorkingDirectory)/environment/dev'


  - stage: 
    displayName: Plan stage
    jobs:
      - job:
        steps:
        - task: TerraformTask@5
          inputs:
            provider: 'azurerm'
            command: 'init'
            workingDirectory: '$(System.DefaultWorkingDirectory)/environment/dev'
            backendServiceArm: 'AIPROJECTSERVICE'
            backendAzureRmResourceGroupName: 'AI_RG'
            backendAzureRmStorageAccountName: 'aistgproject'
            backendAzureRmContainerName: 'aicontainer'
            backendAzureRmKey: 'terrafrom.tfstate'

        - task: TerraformTask@5
          inputs:
            provider: 'azurerm'
            command: 'plan'
            workingDirectory: '$(System.DefaultWorkingDirectory)/environment/dev'
            environmentServiceNameAzureRM: 'AIPROJECTSERVICE'
            
  - stage: 
    displayName: Manual validation stage
    jobs:
      - job: 
        steps:
        - task: ManualValidation@1
          inputs:
            notifyUsers: 'subhamsinghrajput1994@gmail.com'
            approvers: 'subhamsinghrajput1994@gmail.com'
        

  - stage: 
    displayName: Deploy stage 
    jobs:
      - job: 
        steps:
        - task: TerraformTask@5
          inputs:
            provider: 'azurerm'
            command: 'init'
            workingDirectory: '$(System.DefaultWorkingDirectory)/environment/dev'
            backendServiceArm: 'AIPROJECTSERVICE'
            backendAzureRmResourceGroupName: 'AI_RG'
            backendAzureRmStorageAccountName: 'aistgproject'
            backendAzureRmContainerName: 'aicontainer'
            backendAzureRmKey: 'terrafrom.tfstate'

        - task: TerraformTask@5
          inputs:
            provider: 'azurerm'
            command: 'plan'
            workingDirectory: '$(System.DefaultWorkingDirectory)/environment/dev'
            environmentServiceNameAzureRM: 'AIPROJECTSERVICE'
            

        - task: TerraformTask@5
          inputs:
            provider: 'azurerm'
            command: 'apply'
            workingDirectory: '$(System.DefaultWorkingDirectory)/environment/dev'
            commandOptions: '--auto-approve'
            environmentServiceNameAzureRM: 'AIPROJECTSERVICE'


            